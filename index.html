<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Otherworld Quest Client</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg: #070a12;
      --surface: rgba(9, 14, 28, 0.84);
      --surface-2: rgba(16, 24, 40, 0.95);
      --text: #edf3ff;
      --muted: #a0afd1;
      --border: rgba(100, 170, 255, 0.28);
      --accent-a: #bc4fff;
      --accent-b: #47cfff;
      --ok: #53edab;
      --warn: #ff7c9f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #17203f 0%, #070a12 58%, #030407 100%);
    }
    body { overflow: hidden; }
    #overlay {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(92vw, 460px);
      padding: 18px;
      z-index: 20;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: var(--surface);
      backdrop-filter: blur(18px);
    }
    h1 { margin: 0 0 10px; font-size: 1.2rem; }
    p { margin: 0; color: var(--muted); line-height: 1.45; font-size: 0.95rem; }
    .stack { display: grid; gap: 10px; margin-top: 12px; }
    label { font-size: 0.82rem; color: var(--muted); }
    input, button {
      min-height: 44px;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      font: inherit;
    }
    input {
      background: var(--surface-2);
      color: var(--text);
      padding: 0 12px;
    }
    button {
      cursor: pointer;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, #327fff 0%, #7a58ff 100%);
    }
    button.secondary {
      background: rgba(255,255,255,0.07);
      color: var(--text);
    }
    .status { font-size: 0.88rem; color: var(--muted); }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>Otherworld Quest Client</h1>
    <p>Quest-ready client with backend voice transcription and backend 360 world generation.</p>
    <div class="stack">
      <label for="proxyUrl">Proxy server URL</label>
      <input id="proxyUrl" type="url" placeholder="https://your-server.example.com" autocomplete="off" />
      <button id="micBtn">Initialize Microphone</button>
      <button id="breakoutBtn" class="secondary" hidden>Open in New Tab for VR</button>
      <div id="status" class="status">Waiting for setup.</div>
    </div>
  </div>

  <a-scene vr-voice-greeter renderer="antialias: true; colorManagement: true;" fog="type: exponential; color: #07101d; density: 0.045">
    <a-entity id="rig" position="0 0 0">
      <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
        <a-entity cursor="rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
      </a-camera>
      <a-entity laser-controls="hand: left" quantum-tether raycaster="objects: .interactable, .walkable; far: 50" line="color: #ff5ca8; opacity: 0.75"></a-entity>
      <a-entity laser-controls="hand: right" quantum-tether raycaster="objects: .interactable, .walkable; far: 50" line="color: #53d4ff; opacity: 0.75"></a-entity>
    </a-entity>

    <a-light id="ambient-light" type="ambient" color="#4d5c7a" intensity="1"></a-light>
    <a-light type="point" position="0 4 0" color="#ffffff" intensity="0.45" distance="30"></a-light>
    <a-sky id="vr-sky" color="#070d18"></a-sky>
    <a-plane class="walkable" position="0 0 0" rotation="-90 0 0" width="120" height="120" material="transparent: true; opacity: 0"></a-plane>

    <a-sphere class="interactable" audio-ai-node="type: oracle; baseColor: #381053" position="-1.5 2.5 -4" radius="0.42"
      material="shader: standard; color: #bc4fff; metalness: 0.9; roughness: 0.15; emissive: #381053"
      animation__float="property: position; dir: alternate; to: -1.5 2.72 -4; loop: true; dur: 3200"></a-sphere>
    <a-text value="ORACLE" position="-1.5 1.8 -4" align="center" color="#d997ff" scale="0.82 0.82 0.82"></a-text>

    <a-sphere class="interactable" audio-ai-node="type: reality; baseColor: #103651" position="1.5 2.5 -4" radius="0.42"
      material="shader: standard; color: #47cfff; metalness: 0.9; roughness: 0.15; emissive: #103651"
      animation__float="property: position; dir: alternate; to: 1.5 2.72 -4; loop: true; dur: 2800"></a-sphere>
    <a-text value="REALITY" position="1.5 1.8 -4" align="center" color="#91e3ff" scale="0.82 0.82 0.82"></a-text>

    <a-text id="uiText" value="Left sphere: Oracle objects&#10;Right sphere: Reality sky&#10;Grip: move&#10;Desktop mode uses typed prompts" position="0 3.5 -5" align="center" color="#ffe27a" scale="1.15 1.15 1.15"></a-text>
    <a-entity id="spawned-objects"></a-entity>
    <a-entity id="particle-container"></a-entity>
  </a-scene>

  <script>
    const state = {
      proxyBase: '',
      stream: null,
      micReady: false,
      mediaRecorder: null,
      chunks: []
    };

    const ui = {};
    const DEFAULT_BOARD = 'Left sphere: Oracle objects\nRight sphere: Reality sky\nGrip: move\nDesktop mode uses typed prompts';

    document.addEventListener('DOMContentLoaded', () => {
      ui.proxyInput = document.getElementById('proxyUrl');
      ui.micBtn = document.getElementById('micBtn');
      ui.breakoutBtn = document.getElementById('breakoutBtn');
      ui.status = document.getElementById('status');
      ui.board = document.getElementById('uiText');

      ui.proxyInput.addEventListener('input', () => {
        state.proxyBase = ui.proxyInput.value.trim().replace(/\/$/, '');
        ui.status.textContent = state.proxyBase ? `Proxy set: ${state.proxyBase}` : 'Waiting for setup.';
      });

      ui.micBtn.addEventListener('click', initMic);

      if (window.self !== window.top) {
        ui.breakoutBtn.hidden = false;
        ui.breakoutBtn.addEventListener('click', () => {
          const w = window.open(window.location.href, '_blank', 'noopener');
          if (w) w.opener = null;
        });
      }
    });

    function setBoard(text) {
      ui.board.setAttribute('value', text);
      ui.status.textContent = text.replace(/\n/g, ' | ');
    }

    async function initMic() {
      try {
        state.stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
        state.micReady = true;
        ui.micBtn.textContent = 'Microphone Ready';
        setBoard('Microphone ready.\nYou can enter VR now.');
      } catch (error) {
        console.error(error);
        setBoard('Microphone access failed.\nCheck Quest browser permissions.');
      }
    }

    function speakText(text) {
      if (!('speechSynthesis' in window)) return;
      try {
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.95;
        u.pitch = 1.08;
        speechSynthesis.speak(u);
      } catch (e) {
        console.warn(e);
      }
    }

    async function postJson(path, body) {
      if (!state.proxyBase) throw new Error('Set your proxy server URL first.');
      const res = await fetch(`${state.proxyBase}${path}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function uploadAudioForTranscript(blob, mode) {
      if (!state.proxyBase) throw new Error('Set your proxy server URL first.');
      const form = new FormData();
      form.append('audio', blob, 'quest-input.webm');
      form.append('mode', mode);
      const res = await fetch(`${state.proxyBase}/transcribe`, {
        method: 'POST',
        body: form
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    AFRAME.registerComponent('vr-voice-greeter', {
      init: function () {
        this.el.addEventListener('enter-vr', () => {
          if (!state.micReady) {
            setBoard('Mic not initialized.\nExit VR and press Initialize Microphone.');
            speakText('Microphone not initialized. Exit VR and press Initialize Microphone.');
          } else {
            setBoard(DEFAULT_BOARD);
            speakText('Audio ready. Hold trigger on a sphere to speak. Use grip to move.');
          }
        });
      }
    });

    AFRAME.registerComponent('quantum-tether', {
      init: function () {
        this.el.addEventListener('gripdown', () => {
          const raycaster = this.el.components.raycaster;
          if (!raycaster || !raycaster.intersections.length) return;
          const hit = raycaster.intersections[0].point;
          document.querySelector('#rig').setAttribute('animation__move', `property: position; to: ${hit.x} 0 ${hit.z}; dur: 600; easing: easeOutExpo`);
        });
      }
    });

    AFRAME.registerComponent('billboard-to-rig', {
      tick: function () {
        const rig = document.querySelector('#rig');
        if (rig) this.el.object3D.lookAt(rig.object3D.position);
      }
    });

    AFRAME.registerComponent('audio-ai-node', {
      schema: {
        type: { type: 'string', default: 'oracle' },
        baseColor: { type: 'string', default: '#555555' }
      },
      init: function () {
        this.isBusy = false;
        this.skyEl = document.querySelector('#vr-sky');
        this.sceneEl = document.querySelector('a-scene');
        this.ambientLight = document.querySelector('#ambient-light');
        this.spawnContainer = document.querySelector('#spawned-objects');
        this.particleContainer = document.querySelector('#particle-container');

        this.el.addEventListener('mousedown', async () => {
          if (this.isBusy) return;

          if (!this.sceneEl.is('vr-mode')) {
            const typed = prompt(`Desktop Preview Mode:\nType your ${this.data.type} request:`);
            if (typed && typed.trim()) await this.processPrompt(typed.trim());
            return;
          }

          if (!state.micReady || !state.stream) {
            setBoard('Mic not initialized.\nExit VR and press Initialize Microphone.');
            return;
          }

          this.isBusy = true;
          state.chunks = [];
          this.el.setAttribute('material', 'emissive', '#ff3344');
          this.el.setAttribute('scale', '1.2 1.2 1.2');
          setBoard(`Recording ${this.data.type.toUpperCase()}...\nRelease trigger to stop.`);

          try {
            state.mediaRecorder = new MediaRecorder(state.stream, { mimeType: 'audio/webm' });
          } catch {
            state.mediaRecorder = new MediaRecorder(state.stream);
          }

          state.mediaRecorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) state.chunks.push(e.data);
          };

          state.mediaRecorder.onstop = async () => {
            try {
              const blob = new Blob(state.chunks, { type: state.mediaRecorder.mimeType || 'audio/webm' });
              if (!blob.size) throw new Error('Recorded audio was empty.');
              setBoard('Uploading audio for transcription...');
              const transcribed = await uploadAudioForTranscript(blob, this.data.type);
              if (!transcribed.text || !transcribed.text.trim()) throw new Error('No transcript returned.');
              await this.processPrompt(transcribed.text.trim());
            } catch (error) {
              console.error(error);
              setBoard(`Voice request failed.\n${error.message}`);
              this.resetNode();
            }
          };

          state.mediaRecorder.start();
        });

        this.el.addEventListener('mouseup', () => {
          if (state.mediaRecorder && state.mediaRecorder.state === 'recording') state.mediaRecorder.stop();
        });
      },

      processPrompt: async function (text) {
        setBoard(`Processing ${this.data.type}...\n"${text}"`);
        try {
          const data = await postJson('/vr', { mode: this.data.type, text });
          if (this.data.type === 'oracle') {
            this.applyOracle(data);
          } else {
            this.applyReality(data);
          }
        } catch (error) {
          console.error(error);
          setBoard(`Request failed.\n${error.message}`);
          this.resetNode();
        }
      },

      applyOracle: function (data) {
        this.spawnContainer.innerHTML = '';
        (Array.isArray(data.objects) ? data.objects : []).forEach(obj => this.spawnObject(obj));
        const wisdom = data.wisdom || 'The signal answers in shapes.';
        setBoard(`Oracle says:\n${wisdom}`);
        speakText(wisdom);
        this.resetNode();
      },

      applyReality: function (data) {
        if (data.skyImageUrl) {
          this.skyEl.setAttribute('src', data.skyImageUrl);
          this.skyEl.removeAttribute('color');
        } else {
          this.skyEl.removeAttribute('src');
          this.skyEl.setAttribute('color', data.fogColorHex || '#08101d');
        }
        this.ambientLight.setAttribute('light', 'color', data.ambientColorHex || '#445577');
        this.sceneEl.setAttribute('fog', `type: exponential; color: ${data.fogColorHex || '#08101d'}; density: ${Number(data.fogDensity) || 0.045}`);
        this.spawnParticles(data.particleColorHex || '#77c6ff');
        const text = data.manifesto || 'Reality shift complete.';
        setBoard(`Reality shift complete.\n${text}`);
        speakText(text);
        this.resetNode();
      },

      spawnObject: function (obj) {
        const entity = document.createElement('a-entity');
        const shape = ['box','sphere','cylinder','cone','torus','dodecahedron'].includes(obj.shape) ? obj.shape : 'sphere';
        let geometry = `primitive: ${shape}`;
        if (shape === 'torus') geometry += '; radius: 0.3; radiusTubular: 0.05';
        if (shape === 'dodecahedron') geometry += '; radius: 0.4';
        entity.setAttribute('geometry', geometry);
        const color = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(obj.colorHex || '') ? obj.colorHex : '#bc4fff';
        const materialType = obj.materialType || 'neon';
        if (materialType === 'glass') {
          entity.setAttribute('material', `color: ${color}; metalness: 0.08; roughness: 0.08; transparent: true; opacity: 0.4; side: double`);
        } else if (materialType === 'metallic') {
          entity.setAttribute('material', `color: ${color}; metalness: 0.88; roughness: 0.12`);
        } else if (materialType === 'matte') {
          entity.setAttribute('material', `color: ${color}; metalness: 0.05; roughness: 0.94`);
        } else {
          entity.setAttribute('material', `color: ${color}; shader: flat`);
        }
        const x = Number.isFinite(Number(obj.x)) ? Number(obj.x) : 0;
        const y = Number.isFinite(Number(obj.y)) ? Number(obj.y) : 2.5;
        const z = Number.isFinite(Number(obj.z)) ? Number(obj.z) : -5;
        const scale = Number.isFinite(Number(obj.scale)) ? Number(obj.scale) : 0.9;
        const dur = Number.isFinite(Number(obj.animDuration)) ? Number(obj.animDuration) : 4200;
        entity.setAttribute('position', `${x} ${y} ${z}`);
        entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
        entity.setAttribute('animation__float', `property: position; dir: alternate; to: ${x} ${y + 1.2} ${z}; loop: true; dur: ${dur}; easing: easeInOutSine`);
        entity.setAttribute('animation__spin', `property: rotation; to: 240 360 120; loop: true; dur: ${dur * 1.4}; easing: linear`);
        this.spawnContainer.appendChild(entity);
      },

      spawnParticles: function (color) {
        this.particleContainer.innerHTML = '';
        for (let i = 0; i < 48; i++) {
          const p = document.createElement('a-entity');
          const size = (Math.random() * 0.08 + 0.02).toFixed(3);
          const x = (Math.random() - 0.5) * 20;
          const y = Math.random() * 8 + 0.5;
          const z = (Math.random() - 0.5) * 20;
          p.setAttribute('geometry', `primitive: plane; width: ${size}; height: ${size}`);
          p.setAttribute('material', `shader: flat; color: ${color}; transparent: true; opacity: 0.55; side: double`);
          p.setAttribute('position', `${x} ${y} ${z}`);
          p.setAttribute('billboard-to-rig', '');
          p.setAttribute('animation', `property: position; to: ${x} ${y + 1.5} ${z}; loop: true; dur: ${Math.floor(Math.random() * 8000 + 5000)}; easing: linear`);
          this.particleContainer.appendChild(p);
        }
      },

      resetNode: function () {
        this.isBusy = false;
        this.el.setAttribute('material', 'emissive', this.data.baseColor);
        this.el.setAttribute('scale', '1 1 1');
        setTimeout(() => {
          if (!this.isBusy) setBoard(DEFAULT_BOARD);
        }, 4500);
      }
    });
  </script>
</body>
</html>
